<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-image: linear-gradient(to bottom, black 40%, navy);
            color: white;
        }

        .navbar {
            background: black;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .logout-btn {
            background: #ef4444;
            padding: 8px 14px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .container {
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .form-card {
            background: #1f2937;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .form-card input,
        .form-card textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .form-card button {
            background: navy;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .venue-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .venue-card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
        }

        .venue-card h3 {
            margin-bottom: 10px;
        }

        .venue-card p {
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">Admin Panel</div>
        <a href="/logout" class="logout-btn">Logout</a>
    </nav>
</header>

<div class="container">

    <h1>Venue Management</h1>

    <div class="form-card">
        <h2>Add New Venue</h2>

        <form action="/admin/add-venue" method="POST">

            <input type="text" name="VenueName" placeholder="Venue Name" required>

            <input type="text" name="City" placeholder="City" required>

            <input type="text" name="State" placeholder="State (e.g. PA)" required>

            <input type="number" step="any" name="Latitude" placeholder="Latitude" required>

            <input type="number" step="any" name="Longitude" placeholder="Longitude" required>

            <input type="number" step="0.1" name="SeatingCapacity" placeholder="Seating Capacity">

            <textarea name="Reviews" placeholder="Notes / Reviews"></textarea>

            <button type="submit">Add Venue</button>
        </form>
    </div>

    <h2>Existing Venues</h2>

    <div class="venue-grid">
        {% if venues %}
            {% for venue in venues %}
                <div class="venue-card">
                    <h3>{{ venue["VenueName"] }}</h3>
                    <p><strong>Address:</strong> {{ venue["Location"] }}</p>
                    <p><strong>Capacity:</strong> {{ venue["SeatingCapacity"] }}</p>
                    <p>{{ venue["Reviews"] }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No venues added yet.</p>
        {% endif %}
    </div>

</div>

<script>
function initAutocomplete() {
    const input = document.getElementById("addressInput");

    const autocomplete = new google.maps.places.Autocomplete(input, {
        types: ["geocode"]
    });

    autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;

        const lat = place.geometry.location.lat();
        const lng = place.geometry.location.lng();

        // extract CITY, STATE only
        let cityState = "";

        if (place.address_components) {
            let city = "";
            let state = "";

            for (const comp of place.address_components) {
                if (comp.types.includes("locality")) {
                    city = comp.long_name;
                }
                if (comp.types.includes("administrative_area_level_1")) {
                    state = comp.short_name;
                }
            }

            cityState = `${city}, ${state}`;
        }

        document.getElementById("location").value = cityState;
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;
    });
}

document.querySelector("form").addEventListener("submit", function (e) {
    const lat = document.getElementById("lat").value;
    const lng = document.getElementById("lng").value;
    const loc = document.getElementById("location").value;

    if (!lat || !lng || !loc) {
        e.preventDefault();
        alert("Please select a valid location from the dropdown.");
    }
});
</script>

</body>
</html>
