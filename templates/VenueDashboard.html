<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Dashboard</title>
</head>

<body>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #1e293b;
    color: white;
}

.logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* SECTIONS */
.event-section {
    padding: 50px 30px;
    text-align: center;
    background: #f8fafc;
}

.event-section h2 {
    margin-bottom: 20px;
    font-size: 26px;
    color: #1e293b;
}

/* VENUE DISPLAY */
.event-section p {
    font-size: 15px;
    color: #475569;
    margin-bottom: 10px;
}

/* MAP */
.map-container {
    max-width: 1000px;
    margin: 40px auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    display: none;
    z-index: 10;
}

/* POPUP */
.popForm {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    padding: 30px;
    border-radius: 16px;
    width: 90%;
    max-width: 720px;
    max-height: 90vh;
    background: white;
    display: none;
    overflow-y: auto;
    z-index: 11;
    opacity: 0;
    transition: all 0.25s ease;
}

.popForm.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* FORM */
.form-card {
    padding: 25px;
    border-radius: 14px;
    background: #ffffff;
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

.full {
    grid-column: span 2;
}

/* LABEL */
label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    font-size: 14px;
    background: #f8fafc;
    transition: all 0.2s ease;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #3b82f6;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

textarea {
    min-height: 90px;
    resize: vertical;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #3b82f6, #2563eb);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(59,130,246,0.3);
}

/* VENUE MESSAGE */
#VenueMessage {
    background: #e0f2fe;
    border: 1px solid #7dd3fc;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    color: #0369a1;
}

/* POSTER */
.poster {
    text-align: center;
}

#preview {
    width: 100%;
    max-width: 280px;
    border-radius: 10px;
    margin-top: 10px;
}

.map-container {
    max-width: 1000px;
    margin: 50px auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    border: 1px solid #0000;
    position: relative;
}

.map-container::before {
    content: "Event Locations";
    position: absolute;
    top: 10px;
    left: 15px;
    background: rgba(255,255,255,0.9);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #1e293b;
    z-index: 5;
}

.venues-wrapper {
    overflow-x: auto;
    padding: 20px;
}

.venues-scroll {
    display: flex;
    gap: 16px;
}

.venue-card {
    min-width: 250px;
    flex: 0 0 auto;
    background: #111;
    color: #fff;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
    border: 2px solid transparent;
}

.venue-card.selected {
    border: 2px solid #00ff88;
    background: #1a1a1a;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #1e293b;
    color: white;
}
</style>

<header>
    <nav class="navbar">
        <div><a class="logo" href="/">EventHub</a></div>
        <ul class="nav-links">
            <li><a href="#">Browse</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
</header>

<h1 style="text-align:center;margin-top:20px;">Venue Dashboard</h1>

<section class="event-section">
    <h2 id="venueTitle">Your Venue</h2>
    <button onclick="openVenueForm()">Set Venue</button>
</section>

<input type="hidden" id="savedVenueId" value="{{ savedVenueId }}">

<section class="event-section">
    <h2>Create Event</h2>
    <button onclick="openForm()">Create</button>
</section>

<div id="overlay" class="overlay" onclick="closeForm()"></div>

<div id="popForm" class="popForm">
    <h3>Create Event</h3>

    <form method="POST" action="/create_event" enctype="multipart/form-data" class="form-card">
        <div class="form-grid">

            <div class="full">
                <label>Event Name</label>
                <input name="name" required placeholder="Event Name">
            </div>

            <div>
                <label>Category</label>
                <select name="category_id" required>
                    <option value="" disabled selected>Select category</option>
                    <option value="1">Music</option>
                    <option value="2">Visual Arts</option>
                    <option value="3">Performing Arts</option>
                    <option value="4">Film</option>
                    <option value="5">Lectures & Books</option>
                    <option value="6">Fashion</option>
                    <option value="7">Food & Drink</option>
                    <option value="8">Festivals & Fairs</option>
                    <option value="9">Charities</option>
                    <option value="10">Sports & Active Life</option>
                    <option value="11">Nightlife</option>
                    <option value="12">Kids & Family</option>
                    <option value="13">Other</option>
                </select>
            </div>

            <div>
                <label>Time Slot</label>
                <select name="slot_id" required>
                    <option value="" disabled selected>Select time</option>
                    {% for t in time_slots %}
                        <option value="{{ t.SlotID }}">
                            {{ t.TimeStart }} - {{ t.TimeEnd }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Start Date</label>
                <input type="date" name="start" required>
            </div>

            <div>
                <label>End Date</label>
                <input type="date" name="end" required>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea name="desc" placeholder="Describe your event..."></textarea>
            </div>

            <div>
                <label>Ticket Price</label>
                <input type="number" step="0.01" name="price" placeholder="0.00">
            </div>

            <div class="poster full">
                <label>Poster / Image</label>
                <input type="file" name="poster" accept="image/*" id="file">
                <img id="preview" style="display:none;">
            </div>

            <input type="hidden" name="venue_id" id="eventVenue">

            <div class="full">
                <button type="submit">Create Event</button>
            </div>

        </div>
    </form>

    <button onclick="closeForm()">Close</button>
</div>

<div id="venueOverlay" class="overlay" onclick="closeVenueForm()"></div>

<div id="venueForm" class="popForm">
    <form method="POST" action="/save_venue_choice" id="venueFormSelect">

        <input type="hidden" name="VenueID" id="selectedVenue">

        <div class="venues-wrapper">
            <div class="venues-scroll">

                {% for venue in venues %}
                <div class="venue-card {% if venue.VenueID == savedVenueId %}selected{% endif %}"
                data-id="{{ venue.VenueID }}"
                onclick="selectVenue(this, '{{ venue.VenueID }}')">
                    <h3>{{ venue.VenueName }}</h3>
                    <p>{{ venue.Location }}</p>
                    <p>Capacity: {{ venue.SeatingCapacity or 'N/A' }}</p>
                </div>
                {% endfor %}

            </div>
        </div>

        <button type="submit">Confirm Selection</button>
    </form>
</div>

<div id="posterModal" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    align-items:center;
    justify-content:center;
">

    <span onclick="closePoster()" style="
        position:absolute;
        top:20px;
        right:30px;
        font-size:30px;
        color:white;
        cursor:pointer;
        z-index:10000;
    ">✕</span>

    <div style="
        max-width:900px;
        width:90%;
        background:white;
        border-radius:16px;
        overflow:hidden;
    ">
        <img id="posterModalImg" style="
            width:100%;
            max-height:60vh;
            object-fit:contain;
            background:black;
        ">

        <div style="padding:16px;">
            <h2 id="modalTitle"></h2>
            <p id="modalVenue"></p>
            <p id="modalLocation"></p>
        </div>
    </div>
</div>

<div class="map-container">
    <div id="map" style="width:100%; height:500px;"></div>
</div>

<footer>
    <p>© 2026 EventHub</p>
</footer>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const modal = document.getElementById("posterModal");

    modal?.addEventListener("click", (e) => {
        if (e.target.id === "posterModal") closePoster();
    });
});


function closePoster() {
    document.getElementById("posterModal").style.display = "none";
}
function openPosterByIndex(index) {
    const event = MAP_EVENTS[index];

    if (!event) {
        console.error("Event not found");
        return;
    }

    document.getElementById("posterModalImg").src = event.ImageURL;
    document.getElementById("modalTitle").textContent = event.EventName;
    document.getElementById("modalVenue").textContent = event.VenueName;
    document.getElementById("modalLocation").textContent = event.Location;

    document.getElementById("posterModal").style.display = "flex";
}
</script>

<script>
function selectVenue(element, venueId) {
    document.querySelectorAll(".venue-card").forEach(card => {
        card.classList.remove("selected");
    });

    element.classList.add("selected");

    document.getElementById("selectedVenue").value = venueId;
    document.getElementById("eventVenue").value = venueId;

    const venueName = element.querySelector("h3").innerText;
    document.getElementById("venueTitle").innerText = "Your Venue: " + venueName;
}
</script>

<script>

document.getElementById("venueFormSelect").addEventListener("submit", function(e) {
    const selected = document.getElementById("selectedVenue").value;

    if (!selected) {
        e.preventDefault();
        alert("Please select a venue");
    }
});
</script>

<script>
const overlay = document.getElementById("overlay");
const popForm = document.getElementById("popForm");
const venueOverlay = document.getElementById("venueOverlay");
const venueForm = document.getElementById("venueForm");

function openForm(){
    overlay.style.display="block";
    popForm.style.display="block";
    setTimeout(()=>popForm.classList.add("show"),10);
}

function closeForm(){
    popForm.classList.remove("show");
    setTimeout(()=>{
        popForm.style.display="none";
        overlay.style.display="none";
    },200);
}

function openVenueForm(){
    venueOverlay.style.display="block";
    venueForm.style.display="block";
    setTimeout(()=>venueForm.classList.add("show"),10);
}

function closeVenueForm(){
    venueForm.classList.remove("show");
    setTimeout(()=>{
        venueForm.style.display="none";
        venueOverlay.style.display="none";
    },200);
}
</script>

<script>
    window.addEventListener("DOMContentLoaded", () => {
    const selected = document.querySelector(".venue-card.selected");

    if (selected) {
        const venueName = selected.querySelector("h3").innerText;
        document.getElementById("venueTitle").innerText = "Your Venue: " + venueName;

        const venueId = selected.dataset.id;
        document.getElementById("selectedVenue").value = venueId;
        document.getElementById("eventVenue").value = venueId;
    }
});
</script>

<script>
const file = document.getElementById("file");
const preview = document.getElementById("preview");

file?.addEventListener("change", function () {
    const files = file.files;
    if (files && files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(files[0]);
    }
});
</script>

<script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRnWC5LJrp2i6SVmhpWHaIKpi8PC2xk6k&callback=initMap"
    async defer>
</script>

<script>
async function loadEvents() {
    const res = await fetch("/api/events");

    if (!res.ok) {
        console.error("API failed");
        return [];
    }

    const data = await res.json();
    console.log("Loaded events:", data);
    return data;
}

let MAP_EVENTS = []; 

async function initMap() {

    if (!(window.google && google.maps)) {
        console.error("Google Maps failed to load");
        return;
    }

    const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.5, lng: -98.35 },
        zoom: 4,
        styles: [
            { elementType: "geometry", stylers: [{ color: "#f8fafc" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#cbd5e1" }] }
        ]
    });

    const events = await loadEvents();
    MAP_EVENTS = events;
    const bounds = new google.maps.LatLngBounds();

    let hasMarkers = false;

    events.forEach((e, i) => {

        const lat = parseFloat(e.Latitude);
        const lng = parseFloat(e.Longitude);

        if (isNaN(lat) || isNaN(lng)) {
            console.warn("Invalid coords:", e);
            return;
        }

        hasMarkers = true;

        const pos = { lat, lng };

        const marker = new google.maps.Marker({
            position: pos,
            map,
            title: e.EventName,
            animation: google.maps.Animation.DROP,
            icon: {
                url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
            }
        });

        const info = new google.maps.InfoWindow({
            content: `
                <div style="
                    width:220px;
                    font-family:Arial;
                ">
                    <h4 style="
                        margin:4px 0;
                        font-size:14px;
                        color:#1e293b;
                    ">
                        ${e.EventName}
                    </h4>

                    <p style="
                        margin:0;
                        font-size:12px;
                        color:#475569;
                    ">
                        ${e.VenueName}
                    </p>

                    <p style="
                        margin:0 0 8px;
                        font-size:11px;
                        color:#64748b;
                    ">
                        ${e.Location}
                    </p>

                    ${e.ImageURL ? `
                        <button 
                            onclick="openPosterByIndex(${i})"                            
                            style="
                                width:100%;
                                padding:6px;
                                border:none;
                                border-radius:6px;
                                background:#2563eb;
                                color:white;
                                font-size:12px;
                                cursor:pointer;
                            ">
                            View Poster
                        </button>
                    ` : ""}
                </div>
            `
        });

        marker.addListener("click", () => info.open(map, marker));
        bounds.extend(pos);
    });
    
        map.setCenter({ lat: 39.5, lng: -98.35 });
        map.setZoom(4);
    

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const userPos = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };

            new google.maps.Marker({
                position: userPos,
                map,
                title: "You are here",
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#10b981",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 2
                }
            });
        });
    }
}

window.initMap = initMap;
</script>

</body>
</html>
